name: Hourly Data Harvest

on:
  schedule:
    - cron: '0 * * * *'  # Runs at minute 0 of every hour
  workflow_dispatch:      # Allows you to trigger it manually if needed

jobs:
  harvest-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Matches your environment

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Harvester Script
        env:
          OPENAIR_API_KEY: ${{ secrets.OPENAIR_API_KEY }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python Harvester.py